<style>
:root{
  --paper: #FBFAF7;
  --ink: #23231F;
  --ink-soft: #5B5B54;
  --line: #E1DFD6;
  --accent: #3E6B63;
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'Source Sans 3', -apple-system, sans-serif;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--serif);
  font-size:16.5px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration-thickness:1px;text-underline-offset:2px;}
a:hover{color:var(--ink);}
.wrap{max-width:700px;margin:0 auto;padding:0 24px;}

header{padding:28px 0 0;}
.nav-inner{
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--line);
  padding-bottom:16px;
  max-width:700px;margin:0 auto;padding-left:24px;padding-right:24px;
  flex-wrap:wrap;gap:10px;
}
.nav-name{
  font-family:var(--serif);font-size:19px;font-weight:600;
  text-decoration:none;color:var(--ink);
}
.nav-links{
  display:flex;gap:22px;list-style:none;margin:0;padding:0;
  font-family:var(--sans);font-size:16px;
}
.nav-links a{color:var(--ink-soft);text-decoration:none;}
.nav-links a:hover{color:var(--accent);}
.nav-links a.active{color:var(--ink);border-bottom:1px solid var(--accent);padding-bottom:2px;}

main{padding-top:44px;padding-bottom:20px;}

.page-title{
  font-family:var(--serif);font-weight:600;font-size:30px;
  margin:0 0 30px;
  padding-bottom:14px;
  border-bottom:1px solid var(--line);
}

/* photo + intro, side by side like a masthead */
.intro{display:flex;gap:34px;align-items:flex-start;margin-bottom:14px;}
.photo{flex:0 0 252px;width:252px;height:252px;border-radius:6px;overflow:hidden;}
.photo img{width:100%;height:100%;object-fit:cover;display:block;}
.intro-text h1{font-family:var(--serif);font-weight:600;font-size:30px;margin:0 0 4px;}
.intro-text .role{font-family:var(--sans);font-size:15.5px;color:var(--ink-soft);margin:0 0 14px;}
.intro-text .role a{color:var(--ink-soft);}

@media (max-width:620px){
  .intro{flex-direction:column;align-items:flex-start;}
  .photo{flex:0 0 210px;width:210px;height:210px;}
}

p{margin:0 0 16px;}

.subhead{font-family:var(--serif);font-size:18px;font-weight:600;margin:36px 0 16px;}

.project{margin-bottom:26px;}
.project:last-child{margin-bottom:0;}
.project h3{font-family:var(--serif);font-size:19px;font-weight:600;margin:0 0 4px;}
.project .where{
  font-family:var(--sans);font-size:13.5px;color:var(--accent);
  text-transform:uppercase;letter-spacing:.03em;margin:0 0 8px;
}
.project p{margin:0;color:var(--ink);font-size:16.5px;}

.pubgroup{margin-bottom:28px;}
.pubgroup:last-child{margin-bottom:0;}
.pubgroup h3{
  font-family:var(--sans);font-size:13px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--ink-soft);font-weight:600;margin:0 0 14px;
}
.pub{margin-bottom:14px;font-size:16.5px;}
.pub .authors{color:var(--ink-soft);}
.pub .venue{font-style:italic;color:var(--ink-soft);}
.pub .status{
  font-family:var(--sans);font-size:12px;text-transform:uppercase;color:var(--accent);
  letter-spacing:.03em;margin-left:2px;
}

.service-list{margin:0;padding:0;list-style:none;}
.service-list li{margin-bottom:10px;font-size:16.5px;display:flex;gap:14px;}
.service-list .when{
  flex:0 0 100px;font-family:var(--sans);font-size:13.5px;color:var(--ink-soft);
  padding-top:3px;
}

.press-item{margin-bottom:12px;font-size:16.5px;}
.press-item .outlet{font-family:var(--sans);font-size:13px;color:var(--ink-soft);}

.cv-line{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.btn{
  display:inline-block;font-family:var(--sans);font-size:14.5px;
  padding:9px 18px;border:1px solid var(--ink);
  color:var(--ink);text-decoration:none;border-radius:3px;
}
.btn:hover{background:var(--ink);color:var(--paper);}

.freetime{margin-top:46px;}
.freetime img{max-width:70%;height:auto;border-radius:6px;display:block;margin:0 auto 12px;}
.freetime p{
  font-family:var(--serif);font-style:italic;color:var(--ink-soft);
  font-size:16.5px;margin:0;text-align:center;
}

footer{
  margin-top:60px;padding:28px 0 60px;border-top:1px solid var(--line);
  font-family:var(--sans);font-size:14.5px;color:var(--ink-soft);
}
footer .links{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:10px;}
footer .links a{color:var(--ink-soft);}
footer .links a:hover{color:var(--accent);}
</style>
